filebeat.inputs:
  - type: filestream
    id: system-logs
    enabled: true
    paths:
      - /usr/share/filebeat/logs/*.log
    ignore_older: 0
    scan_frequency: 5s
processors:
  - dissect:
      tokenizer: "%{timestamp} src_ip=%{src_ip} dst_ip=%{dst_ip} action=%{action} bytes=%{bytes}"
      field: "message"
      target_prefix: ""
output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
setup.kibana:
  host: "http://kibana:5601"
